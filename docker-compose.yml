services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db_service
    network_mode: host

  db_service:
    image: postgres:16-alpine
    container_name: agri_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: agriadmin
      POSTGRES_PASSWORD: agriadmin123
      POSTGRES_DB: agri_db
    ports:
      - "5632:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data: